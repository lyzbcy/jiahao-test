<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>嘉豪值测试 · 测出你的本命嘉豪</title>
  <meta name="description" content="你是哪种嘉豪？20 题测出你的豪意值，抽出你的本命嘉豪——自在极意豪、上课全对豪、虚空打碟豪……">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/fairy.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap">
</head>
<body>
  <!-- 浮动云彩/星星装饰（fairy.css） -->
  <div class="sky-deco" aria-hidden="true">
    <span class="cloud cloud-1">☁️</span>
    <span class="cloud cloud-2">☁️</span>
    <span class="star star-1">⭐</span>
    <span class="star star-2">✨</span>
    <span class="star star-3">🌟</span>
  </div>

  <!-- 顶部导航栏 -->
  <header class="topbar">
    <span class="topbar-brand">🥷 嘉豪值测试</span>
    <nav class="topbar-nav">
      <a href="#/">测试</a>
      <a href="#/ranking">排行榜</a>
      <a href="#/collection">图鉴</a>
      <a href="#/about">关于</a>
      <a href="javascript:void(0)" onclick="App.openQq()">加群</a>
      <a href="javascript:void(0)" onclick="App.openReward()">赞赏</a>
    </nav>
  </header>

  <!-- 页面挂载点 -->
  <main id="app"></main>

  <!-- 吉祥物 -->
  <div id="mascot" class="mascot state-idle">
    <div class="mascot-emoji">😎</div>
    <div class="mascot-bubble"><span class="mascot-line">我就是嘉豪。</span></div>
  </div>

  <!-- 赞赏弹窗 -->
  <div id="reward-modal" class="modal-overlay hidden" onclick="if(event.target===this)App.closeReward()">
    <div class="modal-card">
      <button class="modal-close" onclick="App.closeReward()">×</button>
      <h2 class="modal-title">☕ 请作者喝杯咖啡</h2>
      <p class="modal-sub">如果这个测试让你会心一笑，欢迎请作者喝杯咖啡 ☕<br>你的鼓励是我继续做有趣项目最大的动力～</p>
      <img src="img/ui/reward-qr.jpg" alt="赞赏二维码" class="reward-qr" loading="lazy">
      <p class="modal-tip">📱 长按或扫码赞赏 · 金额随意，心意到就好</p>
      <p class="modal-thanks">感谢每一份支持 🙏</p>
    </div>
  </div>

  <!-- 加群弹窗 -->
  <div id="qq-modal" class="modal-overlay hidden" onclick="if(event.target===this)App.closeQq()">
    <div class="modal-card">
      <button class="modal-close" onclick="App.closeQq()">×</button>
      <h2 class="modal-title">💬 加入 QQ 群</h2>
      <p class="modal-sub">想反馈建议、交流嘉豪心得、或者单纯想认识作者？<br>扫码进群，一起成为嘉豪 🎉</p>
      <img src="img/ui/qq-group.jpg" alt="QQ群二维码" class="reward-qr" loading="lazy">
      <p class="modal-tip">📱 长按或扫码加群 · 也可以直接搜索群号加入</p>
      <p class="modal-thanks">群里见！🥷</p>
    </div>
  </div>

  <!-- ====== 模块脚本（顺序重要，app.js 最后）====== -->
  <!-- 配置 + 数据层 -->
  <script src="js/config/supabase.js"></script>
  <script src="js/data/repository.js"></script>
  <!-- 模块 -->
  <script src="js/modules/labels.js"></script>
  <script src="js/modules/test-engine.js"></script>
  <script src="js/modules/trash-talk.js"></script>
  <script src="js/modules/mascot.js"></script>
  <script src="js/modules/sticker.js"></script>
  <script src="js/modules/share-card.js"></script>
  <!-- 页面 -->
  <script src="js/pages/home.js"></script>
  <script src="js/pages/result.js"></script>
  <script src="js/pages/ranking.js"></script>
  <script src="js/pages/collection.js"></script>
  <script src="js/pages/about.js"></script>
  <!-- 主程序最后 -->
  <script src="js/app.js"></script>
</body>
</html>
